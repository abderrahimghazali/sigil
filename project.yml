name: Sigil

options:
  bundleIdPrefix: com.sigil
  deploymentTarget:
    macOS: "14.0"

settings:
  base:
    CURRENT_PROJECT_VERSION: 2
    MARKETING_VERSION: 1.0.1
    PRODUCT_BUNDLE_IDENTIFIER: com.sigil.desktop

targets:
  Sigil:
    type: application
    platform: macOS
    sources:
      - Sigil
    info:
      path: Sigil/Info.plist
      properties:
        CFBundleDisplayName: Sigil
        LSApplicationCategoryType: public.app-category.utilities
        LSUIElement: true
    settings:
      base:
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        ENABLE_HARDENED_RUNTIME: true
        INFOPLIST_FILE: Sigil/Info.plist
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_VERSION: "5.0"
